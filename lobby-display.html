<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071f35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>入口候位看板</title>
<link rel="manifest" href="display.webmanifest?v=73f1">
<link rel="apple-touch-icon" href="images/pwa/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="images/pwa/icon-192.png">
<link rel="stylesheet" href="css/display.css?v=72">
<link rel="stylesheet" href="css/pwa.css?v=73f1">
</head>
<body data-display-mode="lobby" data-pwa-app="display">

<div
    id="displayCalloutOverlay"
    class="display-callout-overlay"
    style="display:none;">

    <div class="display-callout-card">

        <div class="display-callout-label">
            🔔 請準備入場
        </div>

        <div
            id="displayCalloutNumber"
            class="display-callout-number">
            A001
        </div>

        <div
            id="displayCalloutPeople"
            class="display-callout-people">
            1 人
        </div>

    </div>

</div>

<audio
    id="displayCalloutSound"
    preload="auto">
</audio>

<div class="display-shell">
  <div class="display-header">
    <div class="display-title">小怪獸放電所</div>
    <div class="display-capacity">
      <span>目前場內</span>
      <strong id="displayCapacity">0 / 40</strong>
      <span id="displayRemaining">剩餘 40 人</span>
    </div>
  </div>
  <div class="display-grid display-grid-single">
    <section class="display-panel">
      <div class="display-panel-title">等待入場／候位叫號</div>
      <div id="displayWaitingList" class="display-list"></div>
    </section>
  </div>
  <div id="displayPrimaryList" style="display:none;"></div>
  <div class="display-footer">即時更新・<span id="displayClock"></span></div>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="js/cloud/firebase-config.js?v=72"></script>
<script src="js/cloud/v71-migration.js?v=72"></script>
<script src="js/display.js?v=72"></script>
<script src="js/pwa/pwa-manager.js?v=73f1fix1"></script>
</body>
</html>

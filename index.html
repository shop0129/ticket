<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>小怪獸放電所 售票機</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ==========================
首頁
========================== -->

<section id="homePage" class="page">

    <img
        src="images/home-bg.png"
        class="home-bg"
        alt="">

    <img
        src="images/btn-buy-default.png"
        id="startBtn"
        class="start-btn"
        alt="開始購票">

    <!-- 管理按鈕（測試用） -->
    <button
        class="admin-test-btn"
        onclick="showPage('adminLoginPage')">
        管理
    </button>

</section>
<!-- ==========================
票種頁
========================== -->

<section id="ticketPage" class="page">
    <!-- 管理者登入 -->

    <!-- Header -->

    <header class="ticket-header tm-header-bar">

        <button id="backBtn">

            ← 返回

        </button>

        <h1>

            請選擇票種

        </h1>

    </header>

    <!-- 內容 -->

    <main class="ticket-content">

        <!-- 一般票 -->

        <img
            src="images/category-general.png"
            class="category-title">

        <div class="ticket-grid">
                        <!-- 一般票 -->

            <img
                src="images/ticket-2h-green.png"
                class="ticket-btn"
                data-id="ticket2hGreen"
                data-reward="token,band,toy">

            <img
                src="images/ticket-2h-red.png"
                class="ticket-btn"
                data-id="ticket2hRed"
                data-reward="token,band,toy">

            <img
                src="images/ticket-3h-green.png"
                class="ticket-btn"
                data-id="ticket3hGreen"
                data-reward="token,band,toy">

            <img
                src="images/ticket-3h-red.png"
                class="ticket-btn"
                data-id="ticket3hRed"
                data-reward="token,band,toy">

        </div>

      <!-- 早鳥 -->

<img
    src="images/category-summer.png"
    class="category-title">

<div class="ticket-grid">

    <img
        src="images/ticket-early.png"
        class="ticket-btn"
        data-id="early"
        data-reward="token,band,toy">

    <img
        src="images/ticket-summer.png"
        class="ticket-btn"
        data-id="summer"
        data-reward="token,band,toy">

</div>
        <!-- 其他票種 -->

        <img
            src="images/category-other.png"
            class="category-title">

        <div class="ticket-grid">
                        <img
                src="images/ticket-baby.png"
                class="ticket-btn"
                data-id="baby"            
                data-reward="band">

            <img
                src="images/ticket-parent.png"
                class="ticket-btn"
                data-id="parent"  
                data-reward="band">

            <img
                src="images/ticket-token10.png"
                class="ticket-btn"
                data-id="token10" 
                data-reward="token10">

            <img
                src="images/ticket-token25.png"
                class="ticket-btn"
                data-id="token25" 
                data-reward="token25">

        </div>

        <div class="ticket-single">

            <img
                src="images/ticket-powerbank.png"
                class="ticket-btn"
                data-id="powerbank" 
                data-reward="powerbank">

        </div>

    </main>

</section>

<!-- ==========================
確認票券頁
========================== -->

<section id="detailPage" class="page">

    <header class="ticket-header">

        <button id="detailBackBtn">
            ← 返回
        </button>

        <h1>確認票券</h1>

    </header>

<div class="detail-card">

    <img
        id="detailImage"
        class="detail-ticket">

    <h2 id="detailTitle"></h2>

    <div id="detailPrice"></div>
    
    <div class="detail-tip">
        請確認票券內容，並選擇付款方式
    </div>
<hr class="detail-line">

    <div id="detailInfo"></div>

    </div>

    <div class="payment-buttons">

        <button id="linePayBtn">
            LINE Pay
        </button>

        <button id="cashBtn">
            現金付款
        </button>

    </div>

</section>
<!-- ==========================
付款成功頁
========================== -->

<section id="successPage" class="page">

    <div class="success-box">

        <div class="success-icon">
            ✅
        </div>

        <h1>
            付款成功
        </h1>

        <div class="success-tip" id="successTip">
            🎉 歡迎來到小怪獸放電所，祝您玩得開心！🎉 
        </div>

        <div class="print-area" id="printArea">

            <div class="print-status" id="printStatus">
                👾 小怪獸正在準備您的票券...
            </div>

            <div class="progress-bg">

                <div class="progress-fill" id="progressFill"></div>

            </div>

            <div class="progress-text" id="progressText">
                0%
            </div>

        </div>

        <div class="success-title">
            請至櫃檯領取以下物品
        </div>

        <div class="success-items" id="successItems">

        </div>

        <div class="countdown">

           <span id="countdownNumber"></span>

            秒後將自動返回首頁

        </div>

    </div>

</section>
<section id="adminLoginPage" class="page">

    <div class="admin-login">

        <h1>管理者登入</h1>

        <input
            type="password"
            id="adminPassword"
            placeholder="請輸入管理密碼">

        <button class="big-btn" onclick="loginAdmin()">
            登入
        </button>

        <button class="back-btn" onclick="showPage('homePage')">
            返回
        </button>

    </div>

</section>


<!-- 管理首頁 -->
<section id="adminHomePage" class="page">

    <h1 class="title">管理後台</h1>

<button
    class="big-btn"
    onclick="openTicketManager()">

    🎫 票券管理

</button>
    <button class="big-btn">🎉 活動設定</button>

    <button class="big-btn">⚙ 系統設定</button>

    <button class="big-btn">🖨 硬體測試</button>

    <button class="big-btn" onclick="showPage('homePage')">
        返回首頁
    </button>

</section>
    
<!-- ==========================
票券管理 V3.8
========================== -->

<section id="ticketManagerPage" class="page">

    <div class="tm-page">

        <div class="tm-top">

            <button
                class="back-btn"
                onclick="showPage('adminHomePage')">

                ← 返回

            </button>

            <h1 class="tm-title">

                🎫 票券管理

            </h1>

        </div>

        <div id="ticketTable">

            <!-- renderTicketManager() 自動產生 -->

        </div>

        <div class="tm-footer">

            <button
                class="big-btn"
                onclick="saveTicketManager()">

                💾 儲存全部

            </button>

        </div>

    </div>

</section>
<audio id="successSound" preload="auto">
    <source src="sounds/success.wav" type="audio/wav">
</audio>
    <audio id="clickSound" preload="auto">
    <source src="sounds/click.wav" type="audio/wav">
</audio>
    <script src="js/script.js"></script>
</body>
</html>

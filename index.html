<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>小怪獸放電所 售票機</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
首頁
========================== -->

<section id="homePage" class="page">

    <div class="home-bg"></div>

    <img
        src="images/btn-buy-default.png"
        id="startBtn"
        class="start-btn"
        alt="開始購票">

</section>

<!-- ==========================
票種頁
========================== -->

<section id="ticketPage" class="page">

    <!-- Header -->

    <header class="ticket-header">

        <button id="backBtn">

            ← 返回

        </button>

        <h1>

            請選擇票種

        </h1>

    </header>

    <!-- 內容 -->

    <main class="ticket-content">

        <!-- 一般票 -->

        <img
            src="images/category-general.png"
            class="category-title">

        <div class="ticket-grid">
                        <!-- 一般票 -->

            <img
                src="images/ticket-2h-green.png"
                class="ticket-btn"
                data-title="2H 綠怪獸"
                data-price="$250"
                data-info="10枚代幣<br>送綠色玩具">

            <img
                src="images/ticket-2h-red.png"
                class="ticket-btn"
                data-title="2H 紅怪獸"
                data-price="$300"
                data-info="15枚代幣<br>送紅色玩具">

            <img
                src="images/ticket-3h-green.png"
                class="ticket-btn"
                data-title="3H 綠怪獸"
                data-price="$300"
                data-info="15枚代幣<br>送綠色玩具">

            <img
                src="images/ticket-3h-red.png"
                class="ticket-btn"
                data-title="3H 紅怪獸"
                data-price="$350"
                data-info="20枚代幣<br>送紅色玩具">

        </div>

        <!-- 平日早鳥 -->

        <img
            src="images/category-early.png"
            class="category-title">

        <div class="ticket-single">

            <img
                src="images/ticket-early.png"
                class="ticket-btn-wide"
                data-title="平日早鳥票"
                data-price="$300"
                data-info="14:00~15:30 入場<br>可暢玩至18:00<br>20枚代幣<br>送紅色玩具">

        </div>

        <!-- 寒暑假 -->

        <img
            src="images/category-summer.png"
            class="category-title">

        <div class="ticket-single">

            <img
                src="images/ticket-summer.png"
                class="ticket-btn-wide"
                data-title="寒暑假限定"
                data-price="$350"
                data-info="10:00~11:30 入場<br>可暢玩至16:00<br>20枚代幣<br>送紅色玩具<br>每日限量20名">

        </div>

        <!-- 其他票種 -->

        <img
            src="images/category-other.png"
            class="category-title">

        <div class="ticket-grid">
                        <img
                src="images/ticket-baby.png"
                class="ticket-btn"
                data-title="幼幼票"
                data-price="$100"
                data-info="未滿12個月<br>免費陪同1位家長<br>不送玩具、不送代幣">

            <img
                src="images/ticket-parent.png"
                class="ticket-btn"
                data-title="陪同票"
                data-price="$80"
                data-info="限陪同家長使用<br>須有兒童同行">

            <img
                src="images/ticket-token10.png"
                class="ticket-btn"
                data-title="10枚代幣"
                data-price="$100"
                data-info="兌換10枚遊戲代幣">

            <img
                src="images/ticket-token25.png"
                class="ticket-btn"
                data-title="25枚代幣"
                data-price="$200"
                data-info="兌換25枚遊戲代幣">

        </div>

        <div class="ticket-single">

            <img
                src="images/ticket-powerbank.png"
                class="ticket-btn-wide"
                data-title="🔋 行動電源出租"
                data-price="$50"
                data-info="館內租借<br>離場前請歸還">

        </div>

    </main>

</section>

<!-- ==========================
確認票券頁
========================== -->

<section id="detailPage" class="page">

    <header class="ticket-header">

        <button id="detailBackBtn">
            ← 返回
        </button>

        <h1>確認票券</h1>

    </header>

<div class="detail-card">

    <img
        id="detailImage"
        class="detail-ticket">

    <h2 id="detailTitle"></h2>

    <div id="detailPrice"></div>
    
    <div class="detail-tip">
        請確認票券內容，並選擇付款方式
    </div>

    <div id="detailInfo"></div>

    </div>

    <div class="payment-buttons">

        <button id="linePayBtn">
            LINE Pay
        </button>

        <button id="cashBtn">
            現金付款
        </button>

    </div>

</section>
<!-- ==========================
付款成功頁
========================== -->

<section id="successPage" class="page">

    <div class="success-box">

        <div class="success-icon">
            ✅
        </div>

        <h1>
            付款成功
        </h1>
<div class="success-tip">
    🎉歡迎來到小怪獸放電所，祝您玩得開心！
</div>
       <div class="success-items">

    <div>🪙 請領取代幣</div>

    <div>🎫 請領取入場手環</div>

    <div>🎁 玩具請於離場時憑手環兌換</div>

    <div>🔋 若有租借行動電源，請向櫃檯領取</div>

</div>

        <div class="countdown">

            <span id="countdownNumber">
                5
            </span>

            秒後將自動返回首頁

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>

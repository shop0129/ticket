<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>小怪獸放電所 售票機</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ==========================
首頁
========================== -->

<section id="homePage" class="page">

    <img
        src="images/home-bg.png"
        class="home-bg"
        alt="">

    <img
        src="images/btn-buy-default.png"
        id="startBtn"
        class="start-btn"
        alt="開始購票">

    <!-- 管理按鈕（測試用） -->
    <button
        class="admin-test-btn"
        onclick="showPage('adminLoginPage')">
        管理
    </button>

</section>
<!-- ==========================
票種頁
========================== -->

<section id="ticketPage" class="page">
    <!-- 管理者登入 -->

    <!-- Header -->

    <header class="ticket-header tm-header-bar">

        <button id="backBtn">

            ← 返回

        </button>

        <h1>

            請選擇票種

        </h1>

    </header>

    <!-- 內容 -->

    <main class="ticket-content">

        <!-- 一般票 -->

        <img
            src="images/category-general.png"
            class="category-title">

        <div class="ticket-grid">
                        <!-- 一般票 -->
<div class="ticket-item">
            <img
                src="images/ticket-2h-green.png"
                class="ticket-btn"
                data-id="ticket2hGreen"
                data-reward="token,band,toy">
 <div
        class="ticket-price"
        id="price-ticket2hGreen">

    </div>

</div>
            <div class="ticket-item">
            <img
                src="images/ticket-2h-red.png"
                class="ticket-btn"
                data-id="ticket2hRed"
                data-reward="token,band,toy">
  <div
        class="ticket-price"
        id="price-ticket2hRed">

    </div>

</div>
            <div class="ticket-item">
            <img
                src="images/ticket-3h-green.png"
                class="ticket-btn"
                data-id="ticket3hGreen"
                data-reward="token,band,toy">
  <div
        class="ticket-price"
        id="price-ticket3hGreen">

    </div>

</div>
            <div class="ticket-item">
            <img
                src="images/ticket-3h-red.png"
                class="ticket-btn"
                data-id="ticket3hRed"
                data-reward="token,band,toy">
<div
        class="ticket-price"
        id="price-ticket3hRed">

    </div>

</div>
        </div>

      <!-- 早鳥 -->

<img
    src="images/category-summer.png"
    class="category-title">

        <div class="ticket-grid">
<div class="ticket-item">

    <img
        src="images/ticket-early.png"
        class="ticket-btn"
        data-id="early">

    <div
        class="ticket-price"
        id="price-early">
    </div>

</div>

<div class="ticket-item">

    <img
        src="images/ticket-summer.png"
        class="ticket-btn"
        data-id="summer">

    <div
        class="ticket-price"
        id="price-summer">
    </div>
</div>
</div>
        <!-- 其他票種 -->

        <img
            src="images/category-other.png"
            class="category-title">

        <div class="ticket-grid">
                       <div class="ticket-item">

    <img
        src="images/ticket-baby.png"
        class="ticket-btn"
        data-id="baby">

    <div
        class="ticket-price"
        id="price-baby">
    </div>

</div>

           <div class="ticket-item">

    <img
        src="images/ticket-parent.png"
        class="ticket-btn"
        data-id="parent">

    <div
        class="ticket-price"
        id="price-parent">
    </div>

</div>

            <div class="ticket-item">

    <img
        src="images/ticket-token10.png"
        class="ticket-btn"
        data-id="token10">

    <div
        class="ticket-price"
        id="price-token10">
    </div>

</div>

            <div class="ticket-item">

    <img
        src="images/ticket-token25.png"
        class="ticket-btn"
        data-id="token25">

    <div
        class="ticket-price"
        id="price-token25">
    </div>

</div>

        </div>

       <div class="ticket-single">

    <div class="ticket-item">

        <img
            src="images/ticket-powerbank.png"
            class="ticket-btn"
            data-id="powerbank">

        <div
            class="ticket-price"
            id="price-powerbank">
        </div>

    </div>

</div>
<div id="cartPanel">

    <div id="cartCount">
        🛒 共 0 張
    </div>

    <!-- 新增 -->
    <div id="cartItems"></div>

   <div id="cartAmount"></div>

    <button id="checkoutBtn">
        前往付款
    </button>
<div id="paymentArea" style="display:none;">

    <button id="cartLineBtn">
        LINE Pay
    </button>

    <button id="cartCashBtn">
        現金付款
    </button>

    <button id="cartBackBtn">
        ⬅ 返回購物車
    </button>

</div>
</div>

    </main>

</section>

<!-- ==========================
確認票券頁
========================== -->

<section id="detailPage" class="page">

    <header class="ticket-header">

        <button id="detailBackBtn">
            ← 返回
        </button>

        <h1>確認票券</h1>

    </header>

<div class="detail-card">

    <img
        id="detailImage"
        class="detail-ticket">

    <h2 id="detailTitle"></h2>

    <div id="detailPrice"></div>
    
    <div class="detail-tip">
        請確認票券內容，並選擇付款方式
    </div>
<hr class="detail-line">

    <div id="detailInfo"></div>

    </div>

    <button
    id="addCartBtn"
    onclick="addCurrentTicketToCart()">
    🛒 加入購物車
</button>

<div class="payment-buttons">

    <button id="linePayBtn">
        LINE Pay
    </button>

    <button id="cashBtn">
        現金付款
    </button>

</div>

</section>
<!-- ==========================
付款成功頁
========================== -->

<section id="successPage" class="page">

    <div class="success-box">

        <div class="success-icon">
            ✅
        </div>

        <h1>
            付款成功
        </h1>

        <div class="success-tip" id="successTip">
            🎉 歡迎來到小怪獸放電所，祝您玩得開心！🎉 
        </div>

        <div class="print-area" id="printArea">

            <div class="print-status" id="printStatus">
                👾 小怪獸正在準備您的票券...
            </div>

            <div class="progress-bg">

                <div class="progress-fill" id="progressFill"></div>

            </div>

            <div class="progress-text" id="progressText">
                0%
            </div>

        </div>

        <div class="success-title">
            請至櫃檯領取以下物品
        </div>

        <div class="success-items" id="successItems">

        </div>

        <div class="countdown">

           <span id="countdownNumber"></span>

            秒後將自動返回首頁

        </div>

    </div>

</section>
<section id="adminLoginPage" class="page">

    <div class="admin-login">

        <h1>管理者登入</h1>

        <input
            type="password"
            id="adminPassword"
            placeholder="請輸入管理密碼">

        <button class="big-btn" onclick="loginAdmin()">
            登入
        </button>

        <button class="back-btn" onclick="showPage('homePage')">
            返回
        </button>

    </div>

</section>


<!-- 管理首頁 -->
<section id="adminHomePage" class="page">

    <h1 class="title">管理後台</h1>

<button
    class="big-btn"
    onclick="openTicketManager()">

    🎫 票券管理
<button
    class="big-btn"
    onclick="openTodayStats()">

    📊 營運中心

</button>
    <button
    class="big-btn"
    onclick="openSalesHistory()">

    🧾 售票紀錄

</button>
</button>
    <button class="big-btn">🎉 活動設定</button>

    <button class="big-btn">⚙ 系統設定</button>

    <button class="big-btn">🖨 硬體測試</button>

    <button class="big-btn" onclick="showPage('homePage')">
        返回首頁
    </button>

</section>
    
<!-- ==========================
票券管理 V3.8
========================== -->

<section id="ticketManagerPage" class="page">

    <div class="tm-page">

        <div class="tm-top">

            <button
                class="back-btn"
                onclick="showPage('adminHomePage')">

                ← 返回

            </button>

            <h1 class="tm-title">

                🎫 票券管理

            </h1>

        </div>

        <div id="ticketTable">

            <!-- renderTicketManager() 自動產生 -->

        </div>

        <div class="tm-footer">

            <button
                class="big-btn"
                onclick="saveTicketManager()">

                💾 儲存全部

            </button>

        </div>

    </div>

</section>
    <!-- ==========================
今日統計
========================== -->

<section id="todayStatsPage" class="page">

    <div class="tm-page">

        <div class="tm-top">

            <button
                class="back-btn"
                onclick="showPage('adminHomePage')">

                ← 返回

            </button>

            <h1 class="tm-title">

                📊 營運中心

            </h1>
<div class="statsTabs">

    <button id="todayTab" class="statsTab active">今日</button>

<button id="monthTab" class="statsTab">本月</button>

<button id="totalTab" class="statsTab">累積</button>

</div>
        </div>

        <div id="todayStatsBox">

    <div class="statsCard">

        <div class="statsIcon">🎫</div>

        <div class="statsTitle">售票</div>

        <div class="statsValue" id="statsTickets">0 張</div>

    </div>

    <div class="statsCard">

        <div class="statsIcon">💰</div>

        <div class="statsTitle">收入</div>

        <div class="statsValue" id="statsIncome">NT$0</div>

    </div>

    <div class="statsCard">

        <div class="statsIcon">🪙</div>

        <div class="statsTitle">代幣</div>

        <div class="statsValue" id="statsTokens">0 枚</div>

    </div>

    <div class="statsCard">

        <div class="statsIcon">🟢</div>

        <div class="statsTitle">綠標玩具</div>

        <div class="statsValue" id="statsGreenToy">0 個</div>

    </div>

    <div class="statsCard">

        <div class="statsIcon">🔴</div>

        <div class="statsTitle">紅標玩具</div>

        <div class="statsValue" id="statsRedToy">0 個</div>

    </div>

    <div class="statsCard">

        <div class="statsIcon">👨</div>

        <div class="statsTitle">陪同票</div>

        <div class="statsValue" id="statsParent">0 張</div>

    </div>

</div>

        <div class="statsResetButtons">

    <button
        class="resetBtn todayBtn"
        onclick="resetTodayStats()">

        🔄 今日歸零

    </button>

    <button
        class="resetBtn monthBtn"
        onclick="resetMonthStats()">

        📅 本月歸零

    </button>

    <button
        class="resetBtn totalBtn"
        onclick="resetAllStats()">

        🗑 全部歸零

    </button>

</div>

    </div>

</section>
    <section id="salesHistoryPage" class="page">

    <div class="tm-page">

        <div class="tm-top">

            <button
                class="back-btn"
                onclick="showPage('adminHomePage')">

                ← 返回

            </button>

            <h1 class="tm-title">

                🧾 售票紀錄

            </h1>

        </div>

        <div id="salesHistoryList">

        </div>

    </div>

</section>
    <section id="orderDetailPage" class="page">

    <div class="tm-page">

        <button
            class="back-btn"
            onclick="openSalesHistory()">

            ← 返回

        </button>

        <h1 class="tm-title">

            📄 訂單明細

        </h1>

        <div id="orderDetailContent">

        </div>

    </div>

</section>
<audio id="successSound" preload="auto">
    <source src="sounds/success.wav" type="audio/wav">
</audio>
    <audio id="clickSound" preload="auto">
    <source src="sounds/click.wav" type="audio/wav">
</audio>

<script src="js/config/state.js"></script>
<script src="js/config/data.js"></script>
    
<script src="js/utils/storage.js"></script>
<script src="js/utils/helper.js"></script>
<script src="js/utils/sound.js"></script>
    
<script src="js/modules/page.js"></script>  
<script src="js/modules/history.js"></script>    
<script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>親子樂園售票機</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:sans-serif;
    background:#f5f5f5;
    overflow:hidden;
}

/* 共用頁面 */

.page{
    width:100vw;
    height:100vh;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.active{
    display:flex;
}

/* 標題 */

.title{
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

/* 大按鈕 */

.big-btn{
    width:80%;
    max-width:700px;
    height:100px;
    font-size:36px;
    border:none;
    border-radius:20px;
    margin:15px;
    background:#ff9800;
    color:white;
}

/* 票券卡片 */

.ticket-card{
    background:white;
    width:85%;
    max-width:750px;
    border-radius:25px;
    padding:30px;
    margin-bottom:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.ticket-title{
    font-size:42px;
    font-weight:bold;
}

.ticket-content{
    font-size:30px;
    margin-top:15px;
    line-height:1.8;
}

.ticket-price{
    font-size:60px;
    color:red;
    margin-top:20px;
    font-weight:bold;
}

/* 返回按鈕 */

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    width:150px;
    height:70px;
    font-size:28px;
    border:none;
    border-radius:15px;
    background:#666;
    color:white;
}

</style>
</head>

<body>

<!-- 首頁 -->

<div id="homePage" class="page active">

    <div class="title">
        親子樂園售票機
    </div>

    <button class="big-btn"
    onclick="showPage('ticketPage')">
        開始購票
    </button>

</div>

<!-- 票種頁 -->

<div id="ticketPage" class="page">

    <button class="back-btn"
    onclick="showPage('homePage')">
        返回
    </button>

    <div class="title">
        請選擇方案
    </div>

    <button class="big-btn"
    onclick="showDetail(
    '2H 遊玩方案',
    '20枚代幣<br>送綠標玩具',
    '$250'
    )">
        2H 綠標 $250
    </button>

    <button class="big-btn"
    onclick="showDetail(
    '2H 遊玩方案',
    '25枚代幣<br>送紅標玩具',
    '$300'
    )">
        2H 紅標 $300
    </button>

    <button class="big-btn"
    onclick="showDetail(
    '3H 遊玩方案',
    '25枚代幣<br>送綠標玩具',
    '$300'
    )">
        3H 綠標 $300
    </button>

    <button class="big-btn"
    onclick="showDetail(
    '3H 遊玩方案',
    '30枚代幣<br>送紅標玩具',
    '$350'
    )">
        3H 紅標 $350
    </button>

    <button class="big-btn"
    onclick="showDetail(
    '代幣兌換',
    '10枚代幣',
    '$100'
    )">
        代幣兌換 $100
    </button>

</div>

<!-- 詳細頁 -->

<div id="detailPage" class="page">

    <button class="back-btn"
    onclick="showPage('ticketPage')">
        返回
    </button>

    <div class="ticket-card">

        <div class="ticket-title" id="detailTitle">
        </div>

        <div class="ticket-content" id="detailContent">
        </div>

        <div class="ticket-price" id="detailPrice">
        </div>

    </div>

    <button class="big-btn"
    onclick="showPage('successPage')">
        LINE Pay 付款
    </button>

    <button class="big-btn"
    onclick="showPage('successPage')">
        現金付款
    </button>

</div>

<!-- 成功頁 -->

<div id="successPage" class="page">

    <div class="title">
        付款成功
    </div>

    <div style="
        font-size:35px;
        line-height:2;
        text-align:center;
    ">
        請領取票券<br>
        並至櫃台領取：<br><br>

        ✓ 代幣<br>
        ✓ 玩具
    </div>

    <button class="big-btn"
    onclick="showPage('homePage')">
        返回首頁
    </button>

</div>

<script>

function showPage(pageId){

    let pages = document.querySelectorAll('.page');

    pages.forEach(function(page){
        page.classList.remove('active');
    });

    document.getElementById(pageId)
    .classList.add('active');
}

function showDetail(title,content,price){

    document.getElementById('detailTitle')
    .innerHTML = title;

    document.getElementById('detailContent')
    .innerHTML = content;

    document.getElementById('detailPrice')
    .innerHTML = price;

    showPage('detailPage');
}

</script>

</body>
</html>

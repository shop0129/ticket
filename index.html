<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1.0">

    <title>親子樂園售票機</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- 首頁 -->
    <section id="homePage" class="page">

    <!-- 背景 -->
    <div class="home-bg"></div>

    <!-- 開始購票 -->
    <img
        src="images/btn-buy-default.png"
        class="start-btn"
        id="startBtn"
        alt="開始購票">

</section>

    <!-- 票種頁 -->
<section id="ticketPage" class="page">

    <div class="ticket-header">

        <button id="backBtn">
            ← 返回
        </button>

        <h1>請選擇票種</h1>

    </div>

    <div class="ticket-content">

        <!-- 一般票 -->

        <img src="images/category-general.png"
        class="category-title">

        <div class="ticket-grid">

            <img
src="images/ticket-2h-green.png"
class="ticket-btn"
data-title="2H 綠怪獸"
data-price="$250">
            <img
src="images/ticket-2h-red.png"
class="ticket-btn"
data-title="2H 紅怪獸"
data-price="$300">
            <img
src="images/ticket-3h-green.png"
class="ticket-btn"
data-title="3H 綠怪獸"
data-price="$300">
<img
src="images/ticket-3h-green.png"
class="ticket-btn"
data-title="3H 紅怪獸"
data-price="$350">
        

        </div>

        <!-- 平日早鳥 -->

        <img src="images/category-early.png"
        class="category-title">

        <div class="ticket-single">

            <img src="images/ticket-early.png"
            class="ticket-btn-wide">

        </div>

        <!-- 寒暑假 -->

        <img src="images/category-summer.png"
        class="category-title">

        <div class="ticket-single">

            <img src="images/ticket-summer.png"
            class="ticket-btn-wide">

        </div>

        <!-- 其他 -->

        <img src="images/category-other.png"
        class="category-title">

        <div class="ticket-grid">

            <img src="images/ticket-baby.png"
            class="ticket-btn">

            <img src="images/ticket-parent.png"
            class="ticket-btn">

            <img src="images/ticket-token10.png"
            class="ticket-btn">

            <img src="images/ticket-token25.png"
            class="ticket-btn">

        </div>

        <div class="ticket-single">

            <img src="images/ticket-powerbank.png"
            class="ticket-btn-wide">

        </div>

    </div>

</section>

    <!-- 詳細頁 -->
    <section id="detailPage">

    </section>

    <!-- 付款頁 -->
    <section id="paymentPage">

    </section>

    <!-- 成功頁 -->
    <section id="successPage">

    </section>

    <script src="script.js"></script>

</body>

</html>
